<title>HouseHunt | Property Details</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fc;
}

/* ===== HEADER ===== */

header{
    background:#1e293b;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 60px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:#fff;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* ===== MAIN ===== */

.container{
    width:90%;
    margin:40px auto;
    display:grid;
    grid-template-columns:55% 45%;
    gap:30px;
}

.image-box{
    background:#fff;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.image-box img{
    width:100%;
    height:500px;
    object-fit:cover;
}

.details{
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

.verify{
    background:#d1fae5;
    color:#047857;
    display:inline-block;
    padding:8px 18px;
    border-radius:20px;
    font-weight:bold;
    margin-bottom:20px;
}

.details h1{
    font-size:35px;
}

.price{
    font-size:30px;
    color:#2563eb;
    font-weight:bold;
    margin:20px 0;
}

.location{
    font-size:18px;
    color:#555;
    margin-bottom:25px;
}

.features{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.feature{
    background:#eff6ff;
    padding:15px;
    border-radius:10px;
    text-align:center;
}

.buttons{
    margin-top:30px;
}

.book{
    background:#2563eb;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    cursor:pointer;
    margin-right:15px;
}

.book:hover{
    background:#1d4ed8;
}

.wish{
    background:#ef4444;
    color:white;
    border:none;
    padding:15px 30px;
    border-radius:8px;
    cursor:pointer;
}

.wish:hover{
    background:#dc2626;
}

.owner{
    margin-top:35px;
    background:#f8fafc;
    padding:20px;
    border-radius:10px;
}

.owner h2{
    margin-bottom:15px;
}

.owner p{
    line-height:35px;
}

.description{
    margin-top:35px;
}

.description h2{
    margin-bottom:15px;
}

.description p{
    color:#555;
    line-height:30px;
}

footer{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:20px;
    margin-top:50px;
}

@media(max-width:900px){

.container{
grid-template-columns:1fr;
}

.image-box img{
height:300px;
}

header{
flex-direction:column;
}

nav{
margin-top:15px;
}

}

</style>

</head>
