<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HouseHunt | Book Property</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#f4f7fc;
}

/* Header */

header{
    background:#1e293b;
    color:#fff;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:18px 60px;
}

.logo{
    font-size:28px;
    font-weight:bold;
}

nav a{
    color:white;
    text-decoration:none;
    margin-left:25px;
    transition:.3s;
}

nav a:hover{
    color:#38bdf8;
}

/* Booking Section */

.container{
    width:90%;
    max-width:1100px;
    margin:40px auto;
}

.booking-card{
    display:grid;
    grid-template-columns:40% 60%;
    background:white;
    border-radius:15px;
    overflow:hidden;
    box-shadow:0 5px 20px rgba(0,0,0,.15);
}

/* Left */

.left{
    background:#2563eb;
    color:white;
    padding:35px;
}

.left img{
    width:100%;
    height:250px;
    object-fit:cover;
    border-radius:10px;
    margin-bottom:20px;
}

.left h2{
    margin-bottom:15px;
}

.info{
    margin:15px 0;
    line-height:30px;
}

/* Right */

.right{
    padding:35px;
}

.right h2{
    margin-bottom:25px;
    color:#1e293b;
}

.form-group{
    margin-bottom:18px;
}

label{
    display:block;
    margin-bottom:8px;
    font-weight:bold;
}

input,
select,
textarea{
    width:100%;
    padding:12px;
    border:1px solid #ccc;
    border-radius:8px;
    outline:none;
    font-size:15px;
}

textarea{
    resize:none;
    height:100px;
}

button{
    width:100%;
    background:#2563eb;
    color:white;
    border:none;
    padding:15px;
    font-size:18px;
    border-radius:8px;
    cursor:pointer;
    transition:.3s;
}

button:hover{
    background:#1d4ed8;
}

footer{
    background:#1e293b;
    color:white;
    text-align:center;
    padding:18px;
    margin-top:40px;
}

/* Responsive */

@media(max-width:900px){

.booking-card{
grid-template-columns:1fr;
}

header{
flex-direction:column;
}

nav{
margin-top:15px;
}

}

</style>

</head>

<body>

<header>

<div class="logo">🏠 HouseHunt</div>

<nav>
<a href="index.html">Home</a>
<a href="houses.html">Properties</a>
<a href="tenant-dashboard.html">Dashboard</a>
<a href="bookings.html">Bookings</a>
</nav>

</header>

<div class="container">

<div class="booking-card">

<!-- LEFT SIDE -->

<div class="left">

<img src="images/houses/house1.jpg" alt="House">

<h2>Luxury 3BHK Apartment</h2>

<div class="info">

<p><b>📍 Location:</b> Hyderabad</p>

<p><b>💰 Rent:</b> ₹25,000 / Month</p>

<p><b>🛏 Bedrooms:</b> 3</p>

<p><b>🛁 Bathrooms:</b> 2</p>

<p><b>📐 Area:</b> 1250 Sq.ft</p>

<p><b>👤 Owner:</b> Ramesh Kumar</p>

<p><b>📞 Contact:</b> +91 9876543210</p>

</div>

</div>

<!-- RIGHT SIDE -->

<div class="right">

<h2>Booking Details</h2>

<form>

<div class="form-group">
<label>Full Name</label>
<input type="text" placeholder="Enter your full name" required>
</div>

<div class="form-group">
<label>Email Address</label>
<input type="email" placeholder="Enter your email" required>
</div>

<div class="form-group">
<label>Mobile Number</label>
<input type="tel" placeholder="Enter mobile number" required>
</div>

<div class="form-group">
<label>Move-in Date</label>
<input type="date" required>
</div>

<div class="form-group">
<label>Number of Family Members</label>
<select required>
<option>Select</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5+</option>
</select>
</div>

<div class="form-group">
<label>ID Proof</label>
<select required>
<option>Select ID Type</option>
<option>Aadhaar Card</option>
<option>PAN Card</option>
<option>Driving License</option>
<option>Passport</option>
</select>
</div>

<div class="form-group">
<label>Special Message</label>
<textarea placeholder="Write your message to the owner..."></textarea>
</div>

<button type="submit">
Confirm Booking
</button>

</form>

</div>

</div>

</div>

<footer>

© 2026 HouseHunt | All Rights Reserved

</footer>

</body>
</html>
